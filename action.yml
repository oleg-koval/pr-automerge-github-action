name: PR bot automerge
description: Automerge pull requests from configured maintenance bots and escalate failures to maintainers.
inputs:
  github-token:
    description: GitHub token used to read PR state, comment, and merge.
    required: false
    default: ${{ github.token }}
  bot-logins:
    description: Comma-separated bot logins allowed to automerge.
    required: false
  maintainer-handles:
    description: Comma-separated GitHub handles to mention when manual action is needed.
    required: true
  merge-method:
    description: Merge method. One of merge, squash, rebase.
    required: false
  config-path:
    description: Repository config path.
    required: false
  wait-timeout:
    description: Maximum time to wait for other checks before deciding. Use Go duration syntax, for example 30m or 0s.
    required: false
  wait-interval:
    description: Poll interval while waiting for checks. Use Go duration syntax, for example 30s.
    required: false
  ignored-check-names:
    description: Comma-separated check run names ignored while deciding merge readiness. Defaults to automerge.
    required: false
  dry-run:
    description: Log intended actions without commenting or merging.
    required: false
runs:
  using: docker
  image: Dockerfile
branding:
  icon: arrow-up-left
  color: red
