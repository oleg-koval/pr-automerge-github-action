version: 2

project_name: pr-automerge-github-action

before:
  hooks:
    - go mod tidy

builds:
  - id: pr-automerge-action
    main: ./cmd/pr-automerge-action
    binary: pr-automerge-action
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: binaries
    ids:
      - pr-automerge-action
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
